<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liftlytics</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1F3CB;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root { --bg:#0c0c0f;--surface:#141418;--surface2:#1c1c22;--border:rgba(255,255,255,0.07);--accent:#5b8dee;--accent2:#e8624a;--green:#4ade80;--amber:#f59e0b;--text:#f0f0f5;--muted:#6b6b7a; }
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
#setup{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(91,141,238,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(232,98,74,0.06) 0%,transparent 50%);}
.setup-box{max-width:420px;width:90%;}
.setup-box h1{font-size:42px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;}
.setup-box h1 span{color:var(--accent);}
.setup-box p{color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6;}
.setup-box input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;margin-bottom:12px;outline:none;transition:border-color 0.2s;}
.setup-box input:focus{border-color:var(--accent);}
.setup-box button{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.setup-box button:hover{opacity:0.9;}
.setup-hint{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;}
.setup-hint a{color:var(--accent);text-decoration:none;}
#app{display:none;}
header{border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;background:rgba(12,12,15,0.95);z-index:100;}
.logo{font-size:18px;font-weight:800;}
.logo span{color:var(--accent);}
.logout{font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:'Syne';}
.logout:hover{color:var(--text);}
nav{display:flex;gap:6px;padding:20px 32px 0;flex-wrap:wrap;}
.nav-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne';font-size:13px;font-weight:500;cursor:pointer;}
.nav-btn.active{background:var(--accent);color:#fff;border-color:transparent;}
main{padding:24px 32px 48px;max-width:1200px;position:relative;}
.tab{display:none;}
.tab.active{display:block;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0.6;}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.metric-value{font-size:28px;font-weight:800;letter-spacing:-1px;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.chart-title{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:16px;font-weight:500;}
.chart-wrap{position:relative;width:100%;height:220px;}
.workout-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;}
.workout-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.workout-meta{font-size:12px;color:var(--muted);}
.workout-pills{margin-top:8px;}
.pill{display:inline-block;background:var(--surface2);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--muted);margin:2px 2px 0 0;font-family:'DM Mono';}
.workout-vol{text-align:right;min-width:90px;}
.workout-vol-num{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.workout-vol-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.pr-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.pr-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
.pr-row:last-child{border-bottom:none;}
.pr-rank{font-size:11px;color:var(--muted);font-family:'DM Mono';width:28px;}
.pr-name{font-size:14px;font-weight:700;flex:1;min-width:120px;}
.ex-row{margin-bottom:12px;}
.ex-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.ex-count{color:var(--muted);font-family:'DM Mono';}
.ex-track{height:5px;background:var(--surface2);border-radius:3px;}
.ex-fill{height:5px;border-radius:3px;background:var(--accent);}
.heatmap-container{overflow-x:auto;padding-bottom:8px;}
.legend{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:var(--muted);}
.legend-cell{width:13px;height:13px;border-radius:3px;display:inline-block;}
.loading-bar{height:3px;background:var(--accent);border-radius:2px;animation:pulse 1.5s ease-in-out infinite;margin:48px auto;width:120px;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}

/* LIFT PROGRESS */
.exercise-list-wrap{display:flex;gap:16px;}
.exercise-search-col{width:280px;flex-shrink:0;}
.exercise-search-col input{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono';font-size:13px;outline:none;margin-bottom:10px;}
.exercise-search-col input:focus{border-color:var(--accent);}
.exercise-list-items{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;max-height:600px;overflow-y:auto;}
.ex-list-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
.ex-list-item:last-child{border-bottom:none;}
.ex-list-item:hover{background:var(--surface2);}
.ex-list-item.selected{background:rgba(91,141,238,0.15);border-left:3px solid var(--accent);}
.ex-list-name{font-size:13px;font-weight:700;}
.ex-list-count{font-size:11px;color:var(--muted);}
.exercise-detail-col{flex:1;min-width:0;}

/* SIDE PANEL */
.side-panel{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:200;transition:right 0.3s;overflow-y:auto;padding:24px;}
.side-panel.open{right:0;}
.panel-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;font-family:'Syne';}
.panel-close:hover{color:var(--text);}
.panel-title{font-size:18px;font-weight:800;margin-bottom:4px;padding-right:32px;}
.panel-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.panel-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.panel-stat{background:var(--surface2);border-radius:10px;padding:12px;}
.panel-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.panel-stat-value{font-size:20px;font-weight:800;}
.panel-stat-sub{font-size:10px;color:var(--muted);}

/* TOOLS TAB */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.tool-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.tool-desc{font-size:11px;color:var(--muted);margin-bottom:16px;}
.tool-input-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.tool-input-row label{font-size:12px;color:var(--muted);width:100px;flex-shrink:0;}
.tool-input-row input,.tool-input-row select{flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono';font-size:13px;outline:none;}
.tool-input-row input:focus,.tool-input-row select:focus{border-color:var(--accent);}
.tool-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Syne';font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;}
.tool-btn:hover{opacity:0.9;}
.tool-result{margin-top:12px;padding:12px;background:var(--surface2);border-radius:8px;font-size:13px;line-height:1.7;display:none;}
.tool-result.show{display:block;}
.result-big{font-size:24px;font-weight:800;color:var(--accent);}
.plate-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;}
.plate-badge{padding:4px 10px;border-radius:20px;font-family:'DM Mono';font-size:12px;font-weight:700;}

/* HEALTH TAB */
.health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;}
.health-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.health-card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px;color:var(--muted);}
.sleep-ring-wrap{display:flex;align-items:center;gap:20px;margin-bottom:16px;}
.log-row{display:flex;gap:8px;margin-bottom:10px;}
.log-row input,.log-row select{flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono';font-size:12px;outline:none;}
.log-row input:focus{border-color:var(--accent);}
.log-btn{padding:8px 14px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Syne';font-size:12px;font-weight:700;cursor:pointer;}
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.log-entry:last-child{border-bottom:none;}
.log-entry-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;}
.log-entry-del:hover{color:var(--accent2);}
.progress-ring{transform:rotate(-90deg);}
.bw-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;}
.recovery-score{font-size:48px;font-weight:800;text-align:center;margin:8px 0;}
.recovery-label{text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px;}
.deload-alert{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:12px;font-size:12px;color:var(--amber);margin-top:10px;line-height:1.6;}
.water-drops{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;}
.water-drop{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background 0.15s;}
.water-drop.filled{background:rgba(91,141,238,0.4);border-color:var(--accent);}
.supp-tag{display:inline-block;background:rgba(91,141,238,0.15);border:1px solid rgba(91,141,238,0.3);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent);margin:3px;cursor:pointer;}
.supp-tag:hover{background:rgba(232,98,74,0.15);border-color:var(--accent2);color:var(--accent2);}
@media(max-width:700px){.exercise-list-wrap{flex-direction:column;}.exercise-search-col{width:100%;}.two-col{grid-template-columns:1fr;}main{padding:16px;}header{padding:0 16px;}nav{padding:16px 16px 0;}.side-panel{width:100%;}}

</style>
</head>
<body>

<div id="setup">
  <div class="setup-box">
    <h1>Liftlytics<span>.</span></h1>
    <p id="setup-tagline">Your personal lifting analytics dashboard.</p>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <input type="text" id="login-username" placeholder="Username" autocomplete="username" />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
        <input type="checkbox" id="remember-me" style="width:auto;margin:0;cursor:pointer;" />
        <label for="remember-me" style="font-size:13px;color:var(--muted);cursor:pointer;">Remember me for 30 days</label>
      </div>
      <button id="login-btn">Log in &rarr;</button>
      <p id="login-error" style="color:#e8624a;font-size:13px;margin-top:10px;min-height:18px;"></p>
      <p class="setup-hint" style="margin-top:16px;">No account? <a href="#" id="go-register">Create one</a></p>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none;">
      <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username" />
      <input type="password" id="reg-password" placeholder="Choose a password (min 6 chars)" autocomplete="new-password" />
      <input type="password" id="reg-password2" placeholder="Confirm password" autocomplete="new-password" />
      <input type="text" id="reg-apikey" placeholder="Hevy API key" />
      <p class="setup-hint" style="margin-bottom:12px;">Get your key at <a href="https://hevy.com/settings?developer" target="_blank">hevy.com/settings?developer</a> (requires Hevy Pro)</p>
      <button id="register-btn">Create account &rarr;</button>
      <p id="register-error" style="color:#e8624a;font-size:13px;margin-top:10px;min-height:18px;"></p>
      <p class="setup-hint" style="margin-top:16px;">Already have an account? <a href="#" id="go-login">Log in</a></p>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">Hevy <span style="color:var(--muted);font-weight:400;">x</span> Liftlytics<span>.</span></div>
    <button class="logout" id="logout-btn">Change key</button>
  </header>
  <nav>
    <button class="nav-btn active" id="nav-overview">Overview</button>
    <button class="nav-btn" id="nav-workouts">Workouts</button>
    <button class="nav-btn" id="nav-prs">PRs</button>
    <button class="nav-btn" id="nav-exercises">Exercises</button>
    <button class="nav-btn" id="nav-progress">Lift Progress</button>
    <button class="nav-btn" id="nav-heatmap">Heatmap</button>
    <button class="nav-btn" id="nav-tools">Tools</button>
    <button class="nav-btn" id="nav-health">Health</button>
    <button class="nav-btn" id="nav-insights">Insights</button>
    <button class="nav-btn" id="nav-routines">Routines</button>
    <button class="nav-btn" id="nav-academy">The Academy</button>
  </nav>
  <main>
    <div id="loading"><div class="loading-bar"></div></div>
    <div id="tab-overview" class="tab active"></div>
    <div id="tab-workouts" class="tab"></div>
    <div id="tab-prs" class="tab"></div>
    <div id="tab-exercises" class="tab"></div>
    <div id="tab-progress" class="tab"></div>
    <div id="tab-heatmap" class="tab"></div>
    <div id="tab-tools" class="tab"></div>
    <div id="tab-health" class="tab"></div>
    <div id="tab-insights" class="tab"></div>
    <div id="tab-routines" class="tab"></div>
    <div id="tab-academy" class="tab"></div>
  </main>
</div>

<!-- SIDE PANEL -->
<div id="side-panel" class="side-panel">
  <button class="panel-close" id="panel-close-btn">&#x2715;</button>
  <div class="panel-title" id="panel-name"></div>
  <div class="panel-sub" id="panel-sub"></div>
  <div class="panel-stats" id="panel-stats"></div>
  <div class="chart-card" style="padding:16px;">
    <div class="chart-title">Best weight over time</div>
    <div style="position:relative;width:100%;height:180px;"><canvas id="panelChart"></canvas></div>
  </div>
  <div id="panel-history"></div>
</div>

<script>
var API_KEY='';var workouts=[];var charts={};var rendered={};var KG_TO_LB=2.20462;

function toLb(kg){return Math.round(kg*KG_TO_LB);}
function localDateKey(d){var y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();return y+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd);}
function localDateDisplay(k){var p=k.split('-');return p[1].replace(/^0/,'')+'/'+p[2].replace(/^0/,'')+'/'+p[0];}
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtDur(s,e){if(!s||!e)return'';var m=Math.round((new Date(e)-new Date(s))/60000);return m<60?m+'m':Math.floor(m/60)+'h '+(m%60)+'m';}
function totalVolKg(w){return(w.exercises||[]).reduce(function(a,e){return a+(e.sets||[]).reduce(function(b,s){return b+((s.weight_kg||0)*(s.reps||0));},0);},0);}
function totalSetsW(w){return(w.exercises||[]).reduce(function(a,e){return a+(e.sets||[]).length;},0);}

// LOCAL STORAGE HELPERS
function lsGet(k){try{var v=localStorage.getItem('liftlytics_'+k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem('liftlytics_'+k,JSON.stringify(v));}catch(e){}}

var VERCEL_URL = 'https://liftlytics.vercel.app';
var currentUser = '';

// AUTH EVENT LISTENERS
document.getElementById('login-btn').addEventListener('click', function(){ doLogin(); });
document.getElementById('register-btn').addEventListener('click', function(){ doRegister(); });
document.getElementById('go-register').addEventListener('click', function(e){ e.preventDefault(); showForm('register'); });
document.getElementById('go-login').addEventListener('click', function(e){ e.preventDefault(); showForm('login'); });
document.getElementById('logout-btn').addEventListener('click', function(){ doLogout(); });
document.getElementById('login-username').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('login-password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('reg-apikey').addEventListener('keydown', function(e){ if(e.key==='Enter') doRegister(); });

function showForm(name) {
  document.getElementById('form-login').style.display = name==='login'?'':'none';
  document.getElementById('form-register').style.display = name==='register'?'':'none';
  document.getElementById('login-error').textContent = '';
  document.getElementById('register-error').textContent = '';
}

function doLogin() {
  var username = document.getElementById('login-username').value.trim();
  var password = document.getElementById('login-password').value;
  var remember = document.getElementById('remember-me').checked;
  var errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if(!username||!password){ errEl.textContent='Please fill in all fields.'; return; }
  document.getElementById('login-btn').textContent = 'Logging in...';
  document.getElementById('login-btn').disabled = true;
  apiPost('/api/login', {username:username, password:password}, function(data) {
    document.getElementById('login-btn').textContent = 'Log in →';
    document.getElementById('login-btn').disabled = false;
    if(data.success) {
      if(remember) {
        lsSet('saved_user', {username:data.username, saved_at: new Date().toISOString()});
      } else {
        lsSet('saved_user', null);
      }
      launchApp(data.username, data.hevy_api_key);
    } else {
      errEl.textContent = data.error || 'Login failed.';
    }
  }, function(err) {
    document.getElementById('login-btn').textContent = 'Log in →';
    document.getElementById('login-btn').disabled = false;
    errEl.textContent = err || 'Could not connect. Try again.';
  });
}

function doRegister() {
  var username = document.getElementById('reg-username').value.trim();
  var password = document.getElementById('reg-password').value;
  var password2 = document.getElementById('reg-password2').value;
  var apikey = document.getElementById('reg-apikey').value.trim();
  var errEl = document.getElementById('register-error');
  errEl.textContent = '';
  if(!username||!password||!password2||!apikey){ errEl.textContent='Please fill in all fields.'; return; }
  if(password !== password2){ errEl.textContent='Passwords do not match.'; return; }
  if(password.length < 6){ errEl.textContent='Password must be at least 6 characters.'; return; }
  document.getElementById('register-btn').textContent = 'Creating account...';
  document.getElementById('register-btn').disabled = true;
  apiPost('/api/register', {username:username, password:password, hevy_api_key:apikey}, function(data) {
    document.getElementById('register-btn').textContent = 'Create account →';
    document.getElementById('register-btn').disabled = false;
    if(data.success) {
      showForm('login');
      document.getElementById('login-username').value = username;
      document.getElementById('login-error').style.color = '#4ade80';
      document.getElementById('login-error').textContent = 'Account created! Log in below.';
    } else {
      errEl.textContent = data.error || 'Could not create account.';
    }
  }, function(err) {
    document.getElementById('register-btn').textContent = 'Create account →';
    document.getElementById('register-btn').disabled = false;
    errEl.textContent = err || 'Could not connect. Try again.';
  });
}

function doLogout() {
  lsSet('saved_user', null);
  currentUser = '';
  API_KEY = '';
  workouts = [];
  rendered = {};
  Object.keys(charts).forEach(function(k){ try{ charts[k].destroy(); }catch(e){} });
  charts = {};
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-error').style.color = '#e8624a';
  ['overview','workouts','prs','exercises','progress','heatmap','tools','health','insights','routines','academy'].forEach(function(t){
    document.getElementById('tab-'+t).innerHTML='';
    document.getElementById('tab-'+t).classList.remove('active');
    document.getElementById('nav-'+t).classList.remove('active');
  });

function apiPost(path, data, onSuccess, onError) {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', VERCEL_URL + path, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 15000;
  xhr.onreadystatechange = function() {
    if(xhr.readyState !== 4) return;
    try {
      var resp = JSON.parse(xhr.responseText);
      if(xhr.status >= 200 && xhr.status < 300) {
        onSuccess(resp);
      } else {
        onError(resp.error || 'Server error');
      }
    } catch(e) {
      onError('Invalid server response');
    }
  };
  xhr.ontimeout = function(){ onError('Request timed out'); };
  xhr.onerror = function(){ onError('Could not reach server'); };
  xhr.send(JSON.stringify(data));
}

// AUTO LOGIN — check for saved session on page load
window.addEventListener('load', function() {
  var saved = lsGet('saved_user');
  if(saved && saved.username && saved.saved_at) {
    var daysSince = (new Date() - new Date(saved.saved_at)) / (1000*60*60*24);
    if(daysSince > 30) {
      lsSet('saved_user', null);
      return;
    }
    // Validate with server
    apiPost('/api/validate', {username: saved.username}, function(data) {
      if(data.success) {
        lsSet('saved_user', {username: data.username, saved_at: new Date().toISOString()});
        launchApp(data.username, data.hevy_api_key);
      } else {
        lsSet('saved_user', null);
      }
    }, function() {
      // Server unreachable - still auto login locally if recent
      if(daysSince < 1) {
        // Can't auto login without API key from server
        lsSet('saved_user', null);
      }
    });
  }
});

  for(var d=new Date(start);d<=now;d.setDate(d.getDate()+1)){var k=localDateKey(d);cells.push({date:k,count:days[k]||0});}
  var weeks=[],week=[];
  for(var i=0;i<start.getDay();i++)week.push(null);
  cells.forEach(function(c){week.push(c);if(week.length===7){weeks.push(week);week=[];}});
  if(week.length){while(week.length<7)week.push(null);weeks.push(week);}
  var colors=['#1c1c22','rgba(91,141,238,0.25)','rgba(91,141,238,0.5)','rgba(91,141,238,0.75)','#5b8dee'];
  var streak=0,sd=new Date(now);
  while(true){var sk=localDateKey(sd);if(days[sk]){streak++;sd.setDate(sd.getDate()-1);}else break;}
  var longest=0,cur=0;cells.forEach(function(c){if(c.count){cur++;if(cur>longest)longest=cur;}else cur=0;});
  var activeDays=Object.keys(days).length;
  function getWeekKey(dateObj){var d=new Date(dateObj);d.setDate(d.getDate()-d.getDay());return localDateKey(d);}
  var weekHasWorkout={};workouts.forEach(function(w){var wk=getWeekKey(new Date(w.start_time));weekHasWorkout[wk]=true;});
  var currentWeekStreak=0,checkDate=new Date(now),currentWk=getWeekKey(checkDate);
  if(weekHasWorkout[currentWk]){currentWeekStreak=1;checkDate.setDate(checkDate.getDate()-7);while(true){var pwk=getWeekKey(checkDate);if(weekHasWorkout[pwk]){currentWeekStreak++;checkDate.setDate(checkDate.getDate()-7);}else break;}}
  var weekKeys=Object.keys(weekHasWorkout).sort(),longestWeekStreak=0,cwk=0,lastWk=null;
  weekKeys.forEach(function(wk){if(lastWk){var p=new Date(lastWk+'T12:00:00');p.setDate(p.getDate()+7);cwk=(localDateKey(p)===wk)?cwk+1:1;}else{cwk=1;}if(cwk>longestWeekStreak)longestWeekStreak=cwk;lastWk=wk;});
  var dayLabels=['S','M','T','W','T','F','S'];
  var dayColHtml='<div style="display:flex;flex-direction:column;gap:3px;margin-right:6px;">'+dayLabels.map(function(d,i){return'<div style="height:13px;font-size:9px;color:var(--muted);line-height:13px;font-family:DM Mono,monospace;">'+(i%2===1?d:'')+'</div>';}).join('')+'</div>';
  var weeksHtml=weeks.map(function(w){return'<div style="display:flex;flex-direction:column;gap:3px;">'+w.map(function(c){if(!c)return'<div style="width:13px;height:13px;"></div>';return'<div title="'+localDateDisplay(c.date)+': '+c.count+' workout'+(c.count!==1?'s':'')+'" style="width:13px;height:13px;border-radius:3px;background:'+colors[Math.min(c.count,4)]+';cursor:default;"></div>';}).join('')+'</div>';}).join('');
  var legendHtml='<div class="legend">Less '+[0,1,2,3,4].map(function(i){return'<div class="legend-cell" style="background:'+colors[i]+';"></div>';}).join('')+' More</div>';
  el.innerHTML='<div class="metrics" style="margin-bottom:24px;"><div class="metric-card"><div class="metric-label">Current day streak</div><div class="metric-value">'+streak+'</div><div class="metric-sub">days in a row</div></div><div class="metric-card"><div class="metric-label">Longest day streak</div><div class="metric-value">'+longest+'</div><div class="metric-sub">days in a row</div></div><div class="metric-card"><div class="metric-label">Current week streak</div><div class="metric-value">'+currentWeekStreak+'</div><div class="metric-sub">weeks in a row</div></div><div class="metric-card"><div class="metric-label">Longest week streak</div><div class="metric-value">'+longestWeekStreak+'</div><div class="metric-sub">weeks in a row</div></div><div class="metric-card"><div class="metric-label">Active days</div><div class="metric-value">'+activeDays+'</div><div class="metric-sub">last 52 weeks</div></div></div><div class="chart-card"><div class="chart-title">Activity — last 52 weeks</div><div class="heatmap-container"><div style="display:flex;gap:3px;align-items:flex-start;">'+dayColHtml+'<div style="display:flex;gap:3px;">'+weeksHtml+'</div></div></div>'+legendHtml+'</div>';
}

function calc1rm(){
  var w=parseFloat(document.getElementById('t1rm-w').value),r=parseFloat(document.getElementById('t1rm-r').value);
  if(!w||!r){alert('Enter weight and reps');return;}
  var e1rm=Math.round(w*(1+r/30));
  var res=document.getElementById('t1rm-res');
  res.innerHTML='<div class="result-big">'+e1rm+' lbs</div><div style="margin-top:8px;color:var(--muted);font-size:12px;">'+
    '90% &rarr; '+Math.round(e1rm*0.9)+' lbs &nbsp; 85% &rarr; '+Math.round(e1rm*0.85)+' lbs &nbsp; 80% &rarr; '+Math.round(e1rm*0.8)+' lbs<br>75% &rarr; '+Math.round(e1rm*0.75)+' lbs &nbsp; 70% &rarr; '+Math.round(e1rm*0.7)+' lbs &nbsp; 65% &rarr; '+Math.round(e1rm*0.65)+' lbs</div>';
  res.classList.add('show');
}

function calcPlates(){
  var target=parseFloat(document.getElementById('tplate-w').value),bar=parseFloat(document.getElementById('tplate-bar').value);
  if(!target){alert('Enter target weight');return;}
  var perSide=(target-bar)/2;
  if(perSide<0){document.getElementById('tplate-res').innerHTML='<span style="color:var(--accent2);">Target is less than bar weight.</span>';document.getElementById('tplate-res').classList.add('show');return;}
  var plates=[45,35,25,10,5,2.5],counts={},rem=perSide;
  plates.forEach(function(p){var n=Math.floor(rem/p);counts[p]=n;rem=Math.round((rem-n*p)*100)/100;});
  var colors={'45':'#e8624a','35':'#5b8dee','25':'#f59e0b','10':'#4ade80','5':'#a78bfa','2.5':'#f0f0f5'};
  var html='<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Per side ('+perSide+' lbs each side):</div>';
  var hasPlates=false;
  plates.forEach(function(p){if(counts[p]>0){hasPlates=true;html+='<div class="plate-row"><span class="plate-badge" style="background:rgba(255,255,255,0.05);color:'+(colors[p]||'#f0f0f5')+';">'+p+' lbs</span><span style="color:var(--muted);">x '+counts[p]+'</span></div>';}});
  if(!hasPlates)html+='<span style="color:var(--muted);">Just the bar!</span>';
  if(rem>0)html+='<div style="font-size:11px;color:var(--accent2);margin-top:6px;">Note: '+rem+' lbs unaccounted for — use smaller fractional plates.</div>';
  document.getElementById('tplate-res').innerHTML=html;document.getElementById('tplate-res').classList.add('show');
}

function calcMacros(){
  var w=parseFloat(document.getElementById('tmac-w').value),h=parseFloat(document.getElementById('tmac-h').value),a=parseFloat(document.getElementById('tmac-a').value);
  var s=document.getElementById('tmac-s').value,act=parseFloat(document.getElementById('tmac-act').value),g=document.getElementById('tmac-g').value;
  if(!w||!h||!a){alert('Fill in all fields');return;}
  var wKg=w/2.205,hCm=h*2.54;
  var bmr=s==='m'?(10*wKg)+(6.25*hCm)-(5*a)+5:(10*wKg)+(6.25*hCm)-(5*a)-161;
  var tdee=Math.round(bmr*act);
  var target=g==='cut'?tdee-500:g==='bulk'?tdee+300:tdee;
  var protein=Math.round(w*0.8),fat=Math.round(target*0.25/9),carbs=Math.round((target-(protein*4)-(fat*9))/4);
  document.getElementById('tmac-res').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;">TDEE</div><div class="result-big" style="font-size:20px;">'+tdee+'</div><div style="font-size:11px;color:var(--muted);">cal/day maintenance</div></div><div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;">Target</div><div class="result-big" style="font-size:20px;">'+target+'</div><div style="font-size:11px;color:var(--muted);">cal/day ('+g+')</div></div></div><div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"><div style="text-align:center;"><div style="font-size:10px;color:var(--muted);">Protein</div><div style="font-size:18px;font-weight:800;color:#5b8dee;">'+protein+'g</div></div><div style="text-align:center;"><div style="font-size:10px;color:var(--muted);">Carbs</div><div style="font-size:18px;font-weight:800;color:#4ade80;">'+carbs+'g</div></div><div style="text-align:center;"><div style="font-size:10px;color:var(--muted);">Fat</div><div style="font-size:18px;font-weight:800;color:#f59e0b;">'+fat+'g</div></div></div>';
  document.getElementById('tmac-res').classList.add('show');
}

function calcWilks(){
  var bwLb=parseFloat(document.getElementById('twilks-bw').value),totalLb=parseFloat(document.getElementById('twilks-t').value),s=document.getElementById('twilks-s').value;
  if(!bwLb||!totalLb){alert('Fill in all fields');return;}
  var bwKg=bwLb/2.205,totalKg=totalLb/2.205;
  var a,b,c,d,e,f;
  if(s==='m'){a=-216.0475144;b=16.2606339;c=-0.002388645;d=-0.00113732;e=7.01863E-06;f=-1.291E-08;}
  else{a=594.31747775582;b=-27.23842536447;c=0.82112226871;d=-0.00930733913;e=4.731582E-05;f=-9.054E-08;}
  var coeff=500/(a+b*bwKg+c*Math.pow(bwKg,2)+d*Math.pow(bwKg,3)+e*Math.pow(bwKg,4)+f*Math.pow(bwKg,5));
  var wilks=Math.round(coeff*totalKg*10)/10;
  var level=wilks<200?'Beginner':wilks<300?'Intermediate':wilks<400?'Advanced':wilks<500?'Elite':'World class';
  var color=wilks<200?'var(--muted)':wilks<300?'#4ade80':wilks<400?'#5b8dee':wilks<500?'#f59e0b':'#e8624a';
  document.getElementById('twilks-res').innerHTML='<div class="result-big">'+wilks+'</div><div style="margin-top:6px;font-size:13px;font-weight:700;color:'+color+';">'+level+'</div><div style="font-size:11px;color:var(--muted);margin-top:4px;">&lt;200 Beginner &middot; 300 Intermediate &middot; 400 Advanced &middot; 500 Elite</div>';
  document.getElementById('twilks-res').classList.add('show');
}

function calcFFMI(){
  var wLb=parseFloat(document.getElementById('tffmi-w').value),hIn=parseFloat(document.getElementById('tffmi-h').value),bf=parseFloat(document.getElementById('tffmi-bf').value);
  if(!wLb||!hIn||!bf){alert('Fill in all fields');return;}
  var wKg=wLb/2.205,hM=hIn*0.0254,lmKg=wKg*(1-bf/100);
  var ffmi=lmKg/(hM*hM),adjFFMI=ffmi+(6.1*(1.8-hM));
  ffmi=Math.round(ffmi*10)/10;adjFFMI=Math.round(adjFFMI*10)/10;
  var level=adjFFMI<18?'Below average':adjFFMI<20?'Average':adjFFMI<22?'Above average':adjFFMI<24?'Excellent':adjFFMI<26?'Superior (possible natural limit)':'Extraordinary (exceeds natural limit)';
  var color=adjFFMI<18?'var(--muted)':adjFFMI<20?'#6b6b7a':adjFFMI<22?'#4ade80':adjFFMI<24?'#5b8dee':adjFFMI<26?'#f59e0b':'#e8624a';
  document.getElementById('tffmi-res').innerHTML='<div class="result-big">'+adjFFMI+'</div><div style="font-size:11px;color:var(--muted);">Adjusted FFMI (raw: '+ffmi+')</div><div style="margin-top:6px;font-size:13px;font-weight:700;color:'+color+';">'+level+'</div><div style="font-size:11px;color:var(--muted);margin-top:4px;">Natural limit is generally considered ~25-26</div>';
  document.getElementById('tffmi-res').classList.add('show');
}

// SLEEP
function logSleep(){
  var d=document.getElementById('sleep-date').value,h=parseFloat(document.getElementById('sleep-hrs').value);
  if(!d||!h)return;
  var log=lsGet('sleep')||[];log.unshift({date:d,hrs:h});log=log.slice(0,60);lsSet('sleep',log);
  document.getElementById('sleep-hrs').value='';renderSleepLog();
}
function renderSleepLog(){
  var log=lsGet('sleep')||[];
  if(!log.length){document.getElementById('sleep-log').innerHTML='<p style="color:var(--muted);font-size:12px;">No sleep logged yet.</p>';updateSleepRing(0);return;}
  var avg=Math.round(log.slice(0,7).reduce(function(a,e){return a+e.hrs;},0)/Math.min(log.length,7)*10)/10;
  document.getElementById('sleep-avg').textContent=avg;updateSleepRing(avg);
  document.getElementById('sleep-log').innerHTML=log.slice(0,7).map(function(e){return'<div class="log-entry"><span style="color:var(--muted);">'+e.date+'</span><span style="font-weight:700;">'+e.hrs+'h</span><button class="log-entry-del" onclick="delSleep(\''+e.date+'\')">&#x2715;</button></div>';}).join('');
}

// RECOVERY
function calcRecovery(){
  var sleep=lsGet('sleep')||[];var avgSleep=sleep.length?sleep.slice(0,3).reduce(function(a,e){return a+e.hrs;},0)/Math.min(sleep.length,3):7;
  var now=new Date(),daysSinceWorkout=7;
  workouts.forEach(function(w){var diff=(now-new Date(w.start_time))/864e5;if(diff<daysSinceWorkout)daysSinceWorkout=diff;});
  var recentWorkouts=workouts.filter(function(w){return(now-new Date(w.start_time))<7*864e5;}).length;
  var sleepScore=Math.min(avgSleep/8,1)*40;
  var restScore=Math.min(daysSinceWorkout/2,1)*30;
  var volScore=Math.max(0,1-recentWorkouts/7)*30;
  var score=Math.round(sleepScore+restScore+volScore);
  var label=score>=80?'Ready to train hard':score>=60?'Good to go':score>=40?'Train light today':'Rest recommended';
  var color=score>=80?'#4ade80':score>=60?'#5b8dee':score>=40?'#f59e0b':'#e8624a';
  document.getElementById('rec-score').textContent=score;document.getElementById('rec-score').style.color=color;
  document.getElementById('rec-label').textContent=label;
  var weekVol=workouts.filter(function(w){return(now-new Date(w.start_time))<14*864e5;});
  var deload=recentWorkouts>=6;
  document.getElementById('deload-tip').innerHTML=deload?'<div class="deload-alert">Deload suggester: You\'ve trained '+recentWorkouts+' times this week. Consider a deload — reduce volume by 40-50% this week to recover and come back stronger.</div>':'';
}

// ===== INSIGHTS =====
function renderInsights() {
  var el = document.getElementById('tab-insights');

  // Muscle counts
  var muscleCounts = {};
  workouts.forEach(function(w) {
    (w.exercises||[]).forEach(function(e) {
      var muscles = getMuscles(e.title||'');
      muscles.forEach(function(m) { muscleCounts[m] = (muscleCounts[m]||0) + 1; });
    });
  });
  var muscleKeys = Object.keys(muscleCounts).sort(function(a,b){return muscleCounts[b]-muscleCounts[a];});

  // Consistency grade
  var now = new Date();
  var last4 = [];
  for (var wi = 3; wi >= 0; wi--) {
    var wS = new Date(now); wS.setDate(wS.getDate() - (wi+1)*7);
    var wE = new Date(now); wE.setDate(wE.getDate() - wi*7);
    var cnt = workouts.filter(function(w) { var d=new Date(w.start_time); return d>=wS&&d<wE; }).length;
    last4.push(cnt);
  }
  var avgPW = last4.reduce(function(a,b){return a+b;},0)/4;
  var grade = avgPW>=5?'A+':avgPW>=4?'A':avgPW>=3?'B':avgPW>=2?'C':avgPW>=1?'D':'F';
  var gradeColor = (grade==='A+'||grade==='A')?'#4ade80':(grade==='B'?'#5b8dee':(grade==='C'?'#f59e0b':'#e8624a'));

  // Best workout
  var bestW = null, bestV = 0;
  workouts.forEach(function(w) { var v=totalVolKg(w)*KG_TO_LB; if(v>bestV){bestV=v;bestW=w;} });

  // Progressive overload
  var olData = {};
  workouts.forEach(function(w) {
    (w.exercises||[]).forEach(function(e) {
      var name = e.title||e.exercise_template_id; if(!name) return;
      var best = 0;
      (e.sets||[]).forEach(function(s){ if(s.weight_kg&&toLb(s.weight_kg)>best)best=toLb(s.weight_kg); });
      if(!best) return;
      if(!olData[name]) olData[name]=[];
      olData[name].push({date:w.start_time,lb:best});
    });
  });
  var improving=[], stalled=[], declining=[];
  Object.keys(olData).forEach(function(name) {
    var hist = olData[name].sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    if(hist.length<4) return;
    var recent = hist.slice(-3), older = hist.slice(-6,-3);
    if(!older.length) return;
    var rAvg = recent.reduce(function(a,h){return a+h.lb;},0)/recent.length;
    var oAvg = older.reduce(function(a,h){return a+h.lb;},0)/older.length;
    if(rAvg > oAvg+2) improving.push({name:name,gain:Math.round(rAvg-oAvg)});
    else if(rAvg < oAvg-2) declining.push({name:name,drop:Math.round(oAvg-rAvg)});
    else stalled.push(name);
  });

  // Training max
  var tmData = {};
  workouts.forEach(function(w) {
    (w.exercises||[]).forEach(function(e) {
      var name = e.title||''; if(!name) return;
      (e.sets||[]).forEach(function(s) {
        if(!s.weight_kg||!s.reps) return;
        var e1 = s.weight_kg*(1+s.reps/30);
        if(!tmData[name]||e1>tmData[name]) tmData[name]=e1;
      });
    });
  });
  var tmKeys = Object.keys(tmData).sort(function(a,b){return tmData[b]-tmData[a];}).slice(0,12);

  // Strength standards - build PR lookup
  var prLookup = {};
  workouts.forEach(function(w){
    (w.exercises||[]).forEach(function(e){
      var name = e.title||'';
      (e.sets||[]).forEach(function(s){
        if(s.weight_kg){
          var lb=toLb(s.weight_kg);
          if(!prLookup[name]||lb>prLookup[name]) prLookup[name]=lb;
        }
      });
    });
  });

  // Gym anniversary
  var gymStart = lsGet('gym_start');
  var anniversaryHtml = '';
  if(gymStart) {
    var gs = new Date(gymStart), dn = new Date();
    var days = Math.floor((dn-gs)/864e5);
    var years = Math.floor(days/365);
    var months = Math.floor((days%365)/30);
    var remDays = days%30;
    var nextAnniv = new Date(gs);
    nextAnniv.setFullYear(dn.getFullYear()+1);
    if(nextAnniv < dn) nextAnniv.setFullYear(dn.getFullYear()+2);
    var daysToAnniv = Math.floor((nextAnniv-dn)/864e5);
    anniversaryHtml = '<div class="chart-card" style="text-align:center;padding:24px 20px;margin-bottom:16px;">' +
      '<div style="font-size:40px;margin-bottom:8px;">&#x1F3CB;</div>' +
      '<div style="font-size:28px;font-weight:800;color:var(--accent);">'+days.toLocaleString()+' days lifting</div>' +
      '<div style="font-size:14px;color:var(--muted);margin:4px 0 12px;">'+years+'y '+months+'m '+remDays+'d</div>' +
      '<div style="font-size:12px;color:var(--muted);">Next anniversary in <b style="color:var(--text);">'+daysToAnniv+' days</b></div>' +
      '<button class="log-btn" style="margin-top:12px;width:auto;padding:6px 16px;font-size:12px;" onclick="resetGymStart()">Change date</button></div>';
  } else {
    anniversaryHtml = '<div class="chart-card" style="margin-bottom:16px;">' +
      '<div class="chart-title">Gym Anniversary</div>' +
      '<p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Set your first day in the gym to track your lifting anniversary.</p>' +
      '<div style="display:flex;gap:8px;max-width:320px;">' +
      '<input type="date" id="gym-start-input" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:DM Mono;font-size:13px;outline:none;"/>' +
      '<button class="log-btn" onclick="saveGymStart()">Save</button></div></div>';
  }

  // Build HTML
  var html = anniversaryHtml;

  // Consistency + best workout
  html += '<div class="two-col">';
  html += '<div class="chart-card" style="text-align:center;">';
  html += '<div class="chart-title">Consistency score</div>';
  html += '<div style="font-size:72px;font-weight:800;color:'+gradeColor+';">'+grade+'</div>';
  html += '<div style="font-size:13px;color:var(--muted);">'+avgPW.toFixed(1)+' workouts/week (last 4 weeks)</div>';
  html += '<div style="display:flex;gap:12px;justify-content:center;margin-top:12px;">';
  last4.forEach(function(c,i) {
    var wc = c>=4?'#4ade80':c>=3?'#5b8dee':c>=2?'#f59e0b':'#e8624a';
    html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);">W-'+(4-i)+'</div><div style="font-size:18px;font-weight:700;color:'+wc+';">'+c+'</div></div>';
  });
  html += '</div></div>';

  if(bestW) {
    html += '<div class="chart-card">';
    html += '<div class="chart-title">Best ever workout</div>';
    html += '<div style="font-size:18px;font-weight:800;margin-bottom:4px;">'+(bestW.name||'Workout')+'</div>';
    html += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">'+fmtDate(bestW.start_time)+' &middot; '+fmtDur(bestW.start_time,bestW.end_time)+' &middot; '+totalSetsW(bestW)+' sets</div>';
    html += '<div style="font-size:28px;font-weight:800;color:var(--accent);">'+Math.round(bestV).toLocaleString()+'</div>';
    html += '<div style="font-size:11px;color:var(--muted);">lbs total volume</div>';
    html += '<div style="margin-top:10px;">';
    (bestW.exercises||[]).slice(0,5).forEach(function(e){ html += '<span class="pill">'+(e.title||'Exercise')+'</span>'; });
    html += '</div></div>';
  }
  html += '</div>';

  // Muscle chart
  if(muscleKeys.length) {
    html += '<div class="chart-card"><div class="chart-title">Muscle group balance</div>';
    html += '<div style="position:relative;width:100%;height:260px;"><canvas id="muscleChart"></canvas></div></div>';
  }

  // Progressive overload
  html += '<div class="two-col">';
  html += '<div class="chart-card"><div class="chart-title" style="color:#4ade80;">Improving lifts</div>';
  if(improving.length) {
    improving.slice(0,8).forEach(function(x){
      html += '<div class="log-entry"><span>'+x.name+'</span><span style="color:#4ade80;font-weight:700;">+'+x.gain+' lbs</span></div>';
    });
  } else { html += '<p style="font-size:12px;color:var(--muted);">Not enough data yet.</p>'; }
  html += '</div>';
  html += '<div class="chart-card"><div class="chart-title" style="color:#e8624a;">Stalled / Declining</div>';
  if(stalled.length||declining.length) {
    declining.slice(0,5).forEach(function(x){ html += '<div class="log-entry"><span>'+x.name+'</span><span style="color:#e8624a;font-weight:700;">-'+x.drop+' lbs</span></div>'; });
    stalled.slice(0,5).forEach(function(n){ html += '<div class="log-entry"><span>'+n+'</span><span style="color:var(--muted);">plateau</span></div>'; });
  } else { html += '<p style="font-size:12px;color:var(--muted);">All good!</p>'; }
  html += '</div></div>';

  // Strength standards
  html += '<div class="chart-card"><div class="chart-title">Strength standards</div>';
  html += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">';
  html += '<tr style="border-bottom:1px solid var(--border);">';
  html += '<th style="text-align:left;padding:8px 4px;color:var(--muted);font-weight:500;font-size:11px;">Exercise</th>';
  html += '<th style="padding:8px 4px;color:var(--muted);font-weight:500;font-size:11px;">Your PR</th>';
  html += '<th style="padding:8px 4px;color:#6b6b7a;font-weight:500;font-size:11px;">Beginner</th>';
  html += '<th style="padding:8px 4px;color:#4ade80;font-weight:500;font-size:11px;">Novice</th>';
  html += '<th style="padding:8px 4px;color:#5b8dee;font-weight:500;font-size:11px;">Intermediate</th>';
  html += '<th style="padding:8px 4px;color:#f59e0b;font-weight:500;font-size:11px;">Advanced</th>';
  html += '<th style="padding:8px 4px;color:#e8624a;font-weight:500;font-size:11px;">Elite</th></tr>';
  var stdKeys = Object.keys(STANDARDS);
  stdKeys.forEach(function(ex) {
    var std = STANDARDS[ex];
    var yourPR = 0;
    Object.keys(prLookup).forEach(function(k){
      if(k.toLowerCase().indexOf(ex.toLowerCase())>-1&&prLookup[k]>yourPR) yourPR=prLookup[k];
    });
    var level = yourPR>=std.elite?'Elite':yourPR>=std.advanced?'Advanced':yourPR>=std.intermediate?'Intermediate':yourPR>=std.novice?'Novice':(yourPR>0?'Beginner':'--');
    var lc = {'Elite':'#e8624a','Advanced':'#f59e0b','Intermediate':'#5b8dee','Novice':'#4ade80','Beginner':'#6b6b7a','--':'var(--muted)'};
    html += '<tr style="border-bottom:1px solid var(--border);">';
    html += '<td style="padding:10px 4px;font-weight:700;">'+ex+'</td>';
    html += '<td style="padding:10px 4px;text-align:center;font-weight:800;color:'+(lc[level]||'var(--muted)')+';">'+(yourPR?yourPR+' lbs':'-')+'</td>';
    html += '<td style="padding:10px 4px;text-align:center;color:#6b6b7a;">'+std.beginner+'</td>';
    html += '<td style="padding:10px 4px;text-align:center;color:#4ade80;">'+std.novice+'</td>';

    html += '<td style="padding:10px 4px;text-align:center;color:#f59e0b;">'+std.advanced+'</td>';
    html += '<td style="padding:10px 4px;text-align:center;color:#e8624a;">'+std.elite+'</td>';
    html += '</tr>';
  });
  html += '</table></div></div>';

  // Training max
  html += '<div class="chart-card"><div class="chart-title">Training max (90% of est. 1RM)</div>';
  html += '<p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Used for programs like 5/3/1. Reduce working weight by 10% from your estimated max.</p>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;">';
  tmKeys.forEach(function(name){
    var tm = Math.round(toLb(tmData[name])*0.9);
    html += '<div style="background:var(--surface2);border-radius:10px;padding:12px;">';
    html += '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">'+name+'</div>';
    html += '<div style="font-size:20px;font-weight:800;color:var(--accent);">'+tm+'</div>';
    html += '<div style="font-size:10px;color:var(--muted);">lbs training max</div></div>';
  });
  html += '</div></div>';

  // Injury tips
  var tips = [
    {title:'Warm up properly',tip:'Do 2-3 warm-up sets at 40%, 60%, 80% of working weight before heavy sets. Never go straight to max effort cold.',color:'#5b8dee'},
    {title:'Track your push/pull ratio',tip:'You should pull roughly as much as you push. If you bench 3x/week but only row 1x/week, your shoulders are at risk.',color:'#f59e0b'},
    {title:'Do not skip rear delts',tip:'Most lifters overtrain front delts and undertrain rear delts. This creates imbalances that cause shoulder impingement over time.',color:'#4ade80'},
    {title:'Deload every 4-8 weeks',tip:'Reduce volume by 40-50% for one week. Muscles adapt faster than tendons - connective tissue needs the extra recovery.',color:'#e8624a'},
    {title:'Sleep 7-9 hours',tip:'Most tissue repair happens during deep sleep. Chronic under-sleep is the number one underrated cause of injury and stalled progress.',color:'#a78bfa'},
    {title:'Add weight gradually',tip:'Do not add more than 5-10 lbs per week on upper body lifts. Tendons lag 6-8 weeks behind muscles in adaptation.',color:'#f59e0b'}
  ];
  html += '<div class="chart-card"><div class="chart-title">Injury prevention</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;">';
  tips.forEach(function(t){
    html += '<div style="background:var(--surface2);border-radius:10px;padding:14px;border-left:3px solid '+t.color+';">';
    html += '<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:'+t.color+';">'+t.title+'</div>';
    html += '<div style="font-size:12px;color:var(--muted);line-height:1.6;">'+t.tip+'</div></div>';
  });
  html += '</div></div>';

  el.innerHTML = html;

  // Render muscle chart after HTML is set
  if(muscleKeys.length) {
    setTimeout(function(){
      if(charts.muscle) charts.muscle.destroy();
      var canvas = document.getElementById('muscleChart');
      if(!canvas) return;
      var barColors = ['#5b8dee','#e8624a','#4ade80','#f59e0b','#a78bfa','#f472b6','#38bdf8','#34d399','#fb923c','#e879f9','#a3e635','#22d3ee'];
      var dataVals = muscleKeys.map(function(k){return muscleCounts[k];});
      charts.muscle = new Chart(canvas, {
        type:'bar',
        data:{labels:muscleKeys,datasets:[{data:dataVals,backgroundColor:barColors,borderRadius:4}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c22',titleColor:'#f0f0f5',bodyColor:'#f0f0f5',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,padding:10,displayColors:false,callbacks:{label:function(ctx){return ctx.parsed.y+' sets';}}}},scales:{y:{beginAtZero:true,ticks:{color:'#6b6b7a'},grid:{color:'rgba(255,255,255,0.05)'}},x:{ticks:{color:'#6b6b7a'},grid:{display:false}}}}
      });
    }, 50);
  }
}

  function drawPhysiology() {
    el.innerHTML = navHtml('physiology') +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-beginner">Beginner</span><span>Muscle Physiology</span></div>' +
      '<h3>How Muscles Grow: The Science of Hypertrophy</h3>' +
      '<p>Muscle growth — technically called skeletal muscle hypertrophy — occurs when muscle protein synthesis exceeds muscle protein breakdown over time. This happens in response to mechanical stress placed on the muscle during resistance training.</p>' +
      '<div class="key-fact">The three primary mechanisms of hypertrophy are <strong>mechanical tension</strong>, <strong>metabolic stress</strong>, and <strong>muscle damage</strong>. Current research suggests mechanical tension is the dominant driver.</div>' +
      '<h4>Mechanical Tension</h4>' +
      '<p>When a muscle contracts against a load, especially through a full range of motion under tension, mechanoreceptors in the muscle fibers detect the strain. This triggers a signaling cascade that activates mTORC1 — the master regulator of muscle protein synthesis. This is why progressive overload (gradually increasing resistance) is the foundational principle of all effective training programs.</p>' +
      '<h4>Metabolic Stress</h4>' +
      '<p>The buildup of metabolic byproducts like lactate, hydrogen ions, and inorganic phosphate during high-rep, short-rest training creates cellular swelling and hormonal responses that contribute to growth. This is the "pump." While less important than mechanical tension, it plays a supporting role — particularly for isolation exercises done in higher rep ranges.</p>' +
      '<h4>Muscle Damage</h4>' +
      '<p>Eccentric contractions (the lowering phase of a lift) cause microscopic tears in muscle fibers. The repair process makes the fiber slightly thicker. However, excessive muscle damage causes prolonged soreness and can actually impair recovery without meaningfully increasing growth beyond what tension alone provides. Soreness is not a reliable indicator of an effective workout.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-intermediate">Intermediate</span><span>Muscle Physiology</span></div>' +
      '<h3>Muscle Fiber Types</h3>' +
      '<p>Skeletal muscle is composed of two primary fiber types, each with distinct characteristics that make them suited to different kinds of work.</p>' +
      '<h4>Type I — Slow Twitch</h4>' +
      '<p>Type I fibers are highly oxidative, fatigue-resistant, and built for endurance. They have a high density of mitochondria and rely primarily on fat and oxygen for fuel. These fibers are recruited first during low-intensity exercise and are dominant in endurance athletes. They have moderate hypertrophic potential.</p>' +
      '<h4>Type II — Fast Twitch</h4>' +
      '<p>Type II fibers are larger, more powerful, and fatigue quickly. They rely on glycolysis for rapid energy production. These are the fibers most responsible for strength and size gains. Type IIx fibers are the fastest and most powerful; Type IIa fibers are intermediate. High-load, low-rep training preferentially recruits Type II fibers.</p>' +
      '<div class="key-fact">Most people have roughly a 50/50 split of fiber types, but this varies significantly by individual and muscle. The calves and soleus tend to be Type I dominant; the chest and triceps tend to be Type II dominant.</div>' +
      '<h4>Motor Unit Recruitment</h4>' +
      '<p>A motor unit is a single motor neuron and all the muscle fibers it controls. The nervous system recruits motor units according to the "size principle" — smaller, Type I units are recruited first, with larger Type II units added as force demands increase. Training close to failure ensures maximum motor unit recruitment regardless of the weight used, which is why high-rep sets taken to near-failure can produce similar hypertrophy to heavy low-rep sets.</p>' +
      '</div>';
  }

  function drawTraining() {
    el.innerHTML = navHtml('training') +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-beginner">Beginner</span><span>Training Science</span></div>' +
      '<h3>Progressive Overload: The Foundational Principle</h3>' +
      '<p>Progressive overload means systematically increasing the demands placed on your muscles over time. Without it, your body has no reason to adapt. With it, growth becomes almost inevitable given adequate nutrition and recovery.</p>' +
      '<div class="key-fact">The most practical way to apply progressive overload: add weight when you can complete all reps with good form. Add reps when you cannot yet add weight. Add sets when reps and weight are both stalling.</div>' +
      '<h4>Forms of Progressive Overload</h4>' +
      '<p>Load progression (adding weight) is the most straightforward method. Volume progression (adding sets or reps) is equally valid and often more practical for intermediate and advanced lifters. Technique improvements, reduced rest periods, increased range of motion, and improved mind-muscle connection all represent forms of progressive overload — your nervous system becomes more efficient at recruiting the target muscle.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-intermediate">Intermediate</span><span>Training Science</span></div>' +
      '<h3>Volume Landmarks: MEV, MAV, and MRV</h3>' +
      '<p>Renaissance Periodization popularized a framework for thinking about training volume using three landmarks per muscle group per week.</p>' +
      '<h4>MEV — Minimum Effective Volume</h4>' +
      '<p>The minimum number of sets per week needed to stimulate growth. For most muscles this is around 4-6 hard sets per week. Training below MEV maintains muscle but does not grow it.</p>' +
      '<h4>MAV — Maximum Adaptive Volume</h4>' +
      '<p>The sweet spot where you get maximum growth per unit of recovery cost. This is where you want to train most of the time — typically 10-20 sets per muscle per week depending on the individual and the muscle group.</p>' +
      '<h4>MRV — Maximum Recoverable Volume</h4>' +
      '<p>The upper limit of volume you can recover from. Exceeding MRV leads to overreaching, declining performance, and elevated injury risk. MRV varies significantly by individual, training history, sleep, and nutrition.</p>' +
      '<div class="key-fact">These numbers are highly individual. Start at MEV, add volume gradually over a training block, and watch for signs of excessive fatigue. When performance drops consistently, you have exceeded your MRV.</div>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-intermediate">Intermediate</span><span>Training Science</span></div>' +
      '<h3>Rep Ranges and What They Actually Do</h3>' +
      '<p>Research shows that hypertrophy can be achieved across a wide range of rep counts — roughly 5 to 30+ reps — provided sets are taken close to muscular failure. The old idea that 8-12 reps is a "hypertrophy range" and 1-5 is "strength only" is an oversimplification.</p>' +
      '<div style="margin:16px 0;">' +
      repRow('1-5 reps','Strength / Neural','#e8624a',95) +
      repRow('6-12 reps','Hypertrophy / Strength','#5b8dee',85) +
      repRow('13-20 reps','Hypertrophy / Endurance','#4ade80',70) +
      repRow('20-30+ reps','Endurance / Metabolic','#f59e0b',50) +
      '</div>' +
      '<p>Heavy sets (1-5 reps) build more strength through neural adaptations. Higher rep sets (15-30) generate more metabolic stress. The middle range (6-15) is practical for most exercises. Incorporating multiple rep ranges across a program is generally the optimal approach.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-advanced">Advanced</span><span>Training Science</span></div>' +
      '<h3>Periodization</h3>' +
      '<p>Periodization is the systematic planning of training variables over time to optimize performance and recovery. The three main models are linear, undulating, and block periodization.</p>' +
      '<h4>Linear Periodization</h4>' +
      '<p>Start with higher volume and lower intensity, progressively shift toward lower volume and higher intensity over weeks or months. Classic beginner and powerlifting approach. Simple and effective for less experienced lifters.</p>' +
      '<h4>Daily Undulating Periodization (DUP)</h4>' +
      '<p>Vary rep ranges within the same week — for example, heavy (3-5 reps) on Monday, moderate (8-12) on Wednesday, higher (15-20) on Friday. Provides more frequent stimulus variation. Popular among intermediate and advanced lifters.</p>' +
      '<h4>Block Periodization</h4>' +
      '<p>Organize training into focused blocks — accumulation (high volume), intensification (higher intensity), and realization (peaking). Used heavily in competitive powerlifting and Olympic lifting. Each block builds on the last.</p>' +
      '</div>';
  }

      '<h4>Meal Frequency and Timing</h4>' +

      suppRow('Caffeine','strong','3-6mg/kg body weight','Increases strength, endurance, and focus. Take 30-60 min pre-workout. Build tolerance management.') +
      suppRow('Protein powder','strong','As needed to hit daily target','Convenient protein source. No advantage over whole food sources — just convenience.') +
      suppRow('Beta-Alanine','moderate','3.2-6.4g/day','Buffers lactic acid. Benefits mainly endurance and high-rep training. Causes harmless tingling.') +

      suppRow('Vitamin D','moderate','1000-4000 IU/day','Supports testosterone, bone health, and immune function. Most people are deficient.') +
      suppRow('Omega-3 Fish Oil','moderate','2-4g/day','Reduces inflammation, may enhance muscle protein synthesis. Joint health benefits.') +
      suppRow('BCAAs','weak','N/A','Redundant if protein intake is adequate. Save your money on whole protein sources.') +
      suppRow('Testosterone boosters','weak','N/A','No meaningful effect on testosterone in healthy individuals. Marketing over science.') +
      '</table></div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-intermediate">Intermediate</span><span>Nutrition Science</span></div>' +
      '<h3>Bulking and Cutting: The Science</h3>' +
      '<p>Body composition change requires manipulating energy balance — calories in versus calories out. The rate of change matters significantly for preserving muscle.</p>' +
      '<h4>Bulking (Caloric Surplus)</h4>' +
      '<p>A surplus of 200-500 calories above TDEE is optimal for maximizing muscle gain while minimizing fat gain. Larger surpluses do not build muscle faster — they primarily add fat. "Dirty bulking" is largely ineffective and requires a longer, harder cut afterward.</p>' +
      '<h4>Cutting (Caloric Deficit)</h4>' +
      '<p>A deficit of 300-500 calories is optimal for fat loss while preserving muscle. Larger deficits accelerate muscle loss, reduce performance, and increase catabolism. High protein intake (1g/lb+) and continued resistance training are the two most important muscle-preservation strategies during a cut.</p>' +
      '<div class="key-fact">Body recomposition — gaining muscle and losing fat simultaneously — is achievable for beginners, those returning from a layoff, and people with higher body fat levels. For advanced natural lifters, dedicated bulk and cut phases are generally more effective.</div>' +
      '</div>';
  }

  function suppRow(name, ev, dose, effect) {
    var evClass = ev==='strong'?'ev-strong':ev==='moderate'?'ev-moderate':'ev-weak';
    var evLabel = ev==='strong'?'Strong':ev==='moderate'?'Moderate':'Weak';
    return '<tr><td style="color:var(--text);font-weight:700;">'+name+'</td><td><span class="evidence-badge '+evClass+'">'+evLabel+'</span></td><td>'+dose+'</td><td>'+effect+'</td></tr>';
  }

  function drawRecovery() {
    el.innerHTML = navHtml('recovery') +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-intermediate">Intermediate</span><span>Recovery Science</span></div>' +
      '<h3>Sleep and Muscle Repair</h3>' +
      '<p>Sleep is the most powerful recovery tool available. The majority of muscle protein synthesis, growth hormone secretion, and tissue repair occurs during deep sleep (slow-wave sleep, or Stage 3 NREM).</p>' +
      '<div class="key-fact">Growth hormone secretion peaks during the first few hours of sleep. Chronic sleep deprivation (under 6 hours) significantly increases cortisol, reduces testosterone, impairs MPS, and elevates injury risk.</div>' +
      '<h4>Sleep Architecture</h4>' +
      '<p>A full sleep cycle lasts roughly 90 minutes and includes light sleep, deep sleep, and REM. Deep sleep dominates early in the night and is most important for physical recovery. REM sleep dominates later and is critical for motor learning and skill consolidation — relevant for technique-driven lifts.</p>' +
      '<h4>Practical Recommendations</h4>' +
      '<p>Target 7-9 hours per night. Consistent sleep and wake times improve sleep quality more than total hours alone. Avoid screens, alcohol, and heavy meals within 90 minutes of bed. Keep the room cool (65-68°F) and dark. Even a single night of poor sleep reduces strength output by 5-10%.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-advanced">Advanced</span><span>Recovery Science</span></div>' +
      '<h3>Supercompensation and Deloads</h3>' +
      '<p>The supercompensation model describes how the body responds to training stress. After a training stimulus, performance temporarily decreases (fatigue). Given adequate recovery, the body rebuilds beyond its previous baseline (supercompensation). This is the mechanism underlying progressive adaptation.</p>' +
      '<h4>Overreaching vs Overtraining</h4>' +
      '<p>Functional overreaching is intentional short-term excessive training followed by a deload — performance drops briefly then rebounds to a new high. Non-functional overreaching occurs when training load exceeds recovery capacity for too long — recovery takes weeks. Overtraining syndrome is rare but serious — recovery takes months and involves hormonal dysregulation.</p>' +
      '<div class="key-fact">Most lifters who think they are "overtrained" are actually just under-recovered. Before reducing training, improve sleep, nutrition, and stress management.</div>' +
      '<h4>Deload Protocols</h4>' +
      '<p>A deload is a planned reduction in training stress to facilitate recovery and supercompensation. Reduce volume (sets) by 40-50% while maintaining intensity (weight). Frequency can stay the same. Duration is typically one week. Deloads should be programmed every 4-8 weeks for intermediate/advanced lifters, or reactively when performance declines for 2+ consecutive sessions.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-advanced">Advanced</span><span>Recovery Science</span></div>' +
      '<h3>Active Recovery and Modalities</h3>' +
      '<p>Active recovery — low-intensity movement on rest days — improves blood flow to muscles, reduces DOMS, and maintains training frequency without adding significant fatigue.</p>' +
      '<h4>What Actually Works</h4>' +
      '<p>Light cardio (walking, cycling, swimming) at under 60% max heart rate for 20-30 minutes is the most evidence-supported active recovery method. Foam rolling reduces perception of soreness but has limited impact on actual recovery. Cold water immersion (ice baths) blunts acute inflammation but may also blunt the anabolic response to training if used chronically — best reserved for competition periods. Massage reduces soreness perception. Stretching has minimal impact on recovery but improves long-term mobility.</p>' +
      '</div>';
  }

  function drawInjury() {
    el.innerHTML = navHtml('injury') +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-beginner">Beginner</span><span>Injury Prevention</span></div>' +
      '<h3>Why Lifters Get Injured</h3>' +
      '<p>The vast majority of lifting injuries are not acute traumatic events — they are overuse injuries that develop gradually from doing too much, too soon, with too little recovery. Understanding the mechanisms helps you avoid them entirely.</p>' +
      '<div class="key-fact">Tendons and ligaments adapt to training stress at a much slower rate than muscles — roughly 6-8 weeks behind. This means your muscles can handle loads your connective tissue cannot yet tolerate. Progressive loading is as much about protecting tendons as it is about building muscle.</div>' +
      '<h4>The Most Common Lifting Injuries</h4>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-beginner">Beginner</span><span>Injury Prevention</span></div>' +
      '<h3>Shoulder Impingement</h3>' +
      '<p>The most common shoulder issue in lifters. Occurs when the rotator cuff tendons are compressed under the acromion during overhead movements. Almost always caused by muscle imbalance — overactive anterior deltoid and upper traps, underactive lower traps, serratus anterior, and rear delts.</p>' +
      '<h4>Prevention</h4>' +
      '<p>Include face pulls, band pull-aparts, and external rotation work every single training week. For every pushing exercise, include at least one pulling exercise. Avoid pressing with extreme internal rotation (elbows flaring too wide on bench press). Address thoracic mobility — a rounded upper back dramatically increases impingement risk.</p>' +
      '<h4>Return to Training</h4>' +
      '<p>Reduce overhead pressing volume. Continue pulling work. Strengthen rear delts and rotator cuff. Address thoracic spine mobility daily. Most cases resolve within 4-8 weeks with conservative management.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-beginner">Beginner</span><span>Injury Prevention</span></div>' +
      '<h3>Lower Back Pain</h3>' +
      '<p>Lower back pain is the single most common complaint among lifters. The two primary culprits are lumbar flexion under load (rounding during deadlifts/rows) and excessive lumbar extension (hyperextension during overhead press or hip thrust).</p>' +
      '<h4>Prevention</h4>' +
      '<p>Master the hip hinge before loading it. Brace your core by taking a deep breath and creating intra-abdominal pressure (Valsalva maneuver) before each heavy rep. Build anterior core strength — plank variations, ab rollouts, and pallof presses are more protective than crunches. Strengthen the glutes — weak glutes force the lower back to compensate.</p>' +
      '<h4>Return to Training</h4>' +
      '<p>Avoid pain-provoking movements. Continue upper body training. Begin McGill Big 3: curl-up, side plank, bird-dog. Gradually reintroduce hip hinge patterns starting with bodyweight. Most acute lower back strains resolve in 2-4 weeks.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-beginner">Beginner</span><span>Injury Prevention</span></div>' +
      '<h3>Patellar Tendinopathy (Knee)</h3>' +
      '<p>Overuse injury of the patellar tendon, typically from rapid increases in squat or jump volume. The tendon becomes sensitized and painful during loading, especially with knee extension under load.</p>' +
      '<h4>Prevention</h4>' +
      '<p>Increase squat and leg press volume gradually — no more than 10% per week. Avoid sitting in full knee flexion for extended periods. Strengthen the VMO (inner quad) with terminal knee extensions and slow, controlled split squats. Eccentric training (slow lowering phase) is the most evidence-based treatment.</p>' +
      '</div>' +
      '<div class="academy-article">' +
      '<div class="academy-article-meta"><span class="academy-tag tag-beginner">Beginner</span><span>Injury Prevention</span></div>' +
      '<h3>Universal Injury Prevention Rules</h3>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:12px;">' +
      injTip('Always warm up','2-3 progressively heavier warm-up sets before working weight. Never skip this. The 5 minutes you save are not worth the months of recovery.','#5b8dee') +
      injTip('Train the posterior chain','Most lifters overtrain pushing muscles. Build a balanced program with equal or greater pulling volume.','#4ade80') +
      injTip('Master technique first','No weight is worth a broken form rep. Leave your ego at the door for the first 6 months of any new movement.','#f59e0b') +
      injTip('Sleep is non-negotiable','Under 7 hours of sleep measurably impairs reaction time, coordination, and tissue repair. Sleep more than you train.','#a78bfa') +
      injTip('Respect the 10% rule','Do not increase total weekly volume by more than 10% per week. Tendons need time.','#e8624a') +
      injTip('Pain is a signal, not a badge','Training through sharp, joint-specific pain causes chronic injuries. Discomfort is fine. Pain is not.','#f472b6') +
      '</div></div>';
  }

  function injTip(title, body, color) {
    return '<div style="background:var(--surface2);border-radius:10px;padding:14px;border-left:3px solid '+color+';">' +
      '<div style="font-size:13px;font-weight:700;color:'+color+';margin-bottom:6px;">'+title+'</div>' +
      '<div style="font-size:12px;color:var(--muted);line-height:1.6;">'+body+'</div></div>';
  }

  window.academyNav = function(section) {
    activeSection = section;
    draw();
  };

  draw();
}

        '<div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;">'+r.summary.slice(0,120)+'...</div>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
        '<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:'+r.color+'22;color:'+r.color+';">'+r.goal+'</span>' +
        '<span style="padding:3px 10px;border-radius:20px;font-size:11px;background:var(--surface2);color:var(--muted);">'+r.level+'</span>' +
        '<span style="padding:3px 10px;border-radius:20px;font-size:11px;background:var(--surface2);color:var(--muted);">'+r.frequency+'</span>' +
        '</div></div>';
    });
    html += '</div>';
    el.innerHTML = html;
  }

  function drawDetail(r) {
    var focusColors = {
      'Rest':'var(--surface2)',
      'Chest':'rgba(91,141,238,0.15)',
      'Back':'rgba(232,98,74,0.15)',
      'Shoulders':'rgba(74,222,128,0.15)',
      'Arms':'rgba(245,158,11,0.15)',
      'Legs':'rgba(167,139,250,0.15)',
      'Push':'rgba(91,141,238,0.15)',
      'Pull':'rgba(232,98,74,0.15)',
      'Upper (Strength)':'rgba(91,141,238,0.15)',
      'Upper (Hypertrophy)':'rgba(91,141,238,0.2)',
      'Lower (Strength)':'rgba(74,222,128,0.15)',
      'Lower (Hypertrophy)':'rgba(74,222,128,0.2)',
      'Full Body A':'rgba(245,158,11,0.15)',
      'Full Body B':'rgba(245,158,11,0.2)',
      'Upper Power':'rgba(91,141,238,0.2)',
      'Lower Power':'rgba(74,222,128,0.2)',
      'Upper Hypertrophy':'rgba(91,141,238,0.15)',
      'Lower Hypertrophy':'rgba(74,222,128,0.15)'
    };
    function dayColor(focus) {
      if(focus==='Rest') return 'var(--surface2)';
      var keys = Object.keys(focusColors);
      for(var i=0;i<keys.length;i++) { if(focus.indexOf(keys[i])>-1) return focusColors[keys[i]]; }
      return 'rgba(91,141,238,0.1)';
    }

    var html = '<button onclick="selectRoutine(null)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-family:Syne,sans-serif;font-size:13px;margin-bottom:20px;padding:0;">&larr; Back to routines</button>';

    html += '<div style="border-top:3px solid '+r.color+';background:var(--surface);border-radius:0 0 14px 14px;padding:24px;margin-bottom:16px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px;">';
    html += '<div><div style="font-size:26px;font-weight:800;letter-spacing:-0.5px;">'+r.name+'</div>';
    html += '<div style="font-size:13px;color:var(--muted);">'+r.aka+'</div></div>';
    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
    html += '<span style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;background:'+r.color+'22;color:'+r.color+';">'+r.goal+'</span>';
    html += '<span style="padding:5px 14px;border-radius:20px;font-size:12px;background:var(--surface2);color:var(--muted);">'+r.level+'</span>';
    html += '<span style="padding:5px 14px;border-radius:20px;font-size:12px;background:var(--surface2);color:var(--muted);">'+r.days+' days/week</span>';
    html += '</div></div>';

    html += '<p style="font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:20px;">'+r.summary+'</p>';

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:0;">';
    html += '<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px;">Pros</div>';
    r.pros.forEach(function(p){ html += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;font-size:13px;"><span style="color:#4ade80;flex-shrink:0;">&#x2713;</span><span style="color:var(--muted);">'+p+'</span></div>'; });
    html += '</div>';
    html += '<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px;">Cons</div>';
    r.cons.forEach(function(c){ html += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;font-size:13px;"><span style="color:#e8624a;flex-shrink:0;">&#x2715;</span><span style="color:var(--muted);">'+c+'</span></div>'; });
    html += '</div></div></div>';

    // Weekly schedule
    html += '<div style="font-size:14px;font-weight:700;margin-bottom:12px;">Weekly Schedule</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px;">';
    r.schedule.forEach(function(day) {
      var isRest = day.focus === 'Rest';
      html += '<div style="background:'+dayColor(day.focus)+';border-radius:10px;padding:14px;border:1px solid var(--border);">';
      html += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">'+day.day+'</div>';
      html += '<div style="font-size:14px;font-weight:800;margin-bottom:8px;color:'+(isRest?'var(--muted)':r.color)+';">'+day.focus+'</div>';
      if(day.exercises.length) {
        day.exercises.forEach(function(ex){
          html += '<div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-family:DM Mono,monospace;">'+ex+'</div>';
        });
      } else {
        html += '<div style="font-size:12px;color:var(--muted);">Active recovery or full rest</div>';
      }
      html += '</div>';
    });
    html += '</div>';

    // Science section
    html += '<div style="background:rgba(91,141,238,0.06);border-left:3px solid var(--accent);padding:16px;border-radius:0 10px 10px 0;margin-bottom:16px;">';
    html += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);margin-bottom:8px;">Science Behind This Program</div>';
    html += '<div style="font-size:13px;color:var(--muted);line-height:1.8;">'+r.science+'</div>';
    html += '</div>';

    el.innerHTML = html;
  }

  window.selectRoutine = function(id) {
    if(!id) { drawList(); return; }
    var r = null;
    ROUTINES.forEach(function(x){ if(x.id===id) r=x; });
    if(r) drawDetail(r);
  };

  drawList();
}


var renders = {overview:renderOverview,workouts:renderWorkouts,prs:renderPRs,exercises:renderExercises,progress:renderProgress,heatmap:renderHeatmap,tools:renderTools,health:renderHealth,insights:renderInsights,routines:renderRoutines,academy:renderAcademy};

</script>
</body>
</html>
